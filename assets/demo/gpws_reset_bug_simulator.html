<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPWS Reset Bug Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    },
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b;
            color: #f4f4f5;
            user-select: none;
            -webkit-user-select: none;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 3px; }
        .arrow-down::after {
            content: "";
            display: block;
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 8px solid #3f3f46;
            margin: 4px auto 0;
        }
        .arrow-right {
            position: relative;
        }
        .arrow-right::after {
            content: "";
            position: absolute;
            top: 50%;
            right: -18px;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
            border-left: 8px solid #3f3f46;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between p-4 md:p-8 overflow-x-hidden">

    <div class="max-w-4xl w-full mx-auto flex-1 flex flex-col justify-between gap-6">

        <header class="flex justify-between items-center border-b border-zinc-800/80 pb-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-normal tracking-tight text-white">GPWS Reset Bug</h1>
                <p class="text-xs text-zinc-500 mt-1">reset()이 modeAData까지 지우면서 GPWS가 계속 normal로만 나오는 과정</p>
            </div>
        </header>

        <main class="relative w-full flex-1 flex flex-col justify-center gap-6 my-2 rounded-xl bg-zinc-950/40 border border-zinc-900 p-6">

            <div class="flex flex-row gap-2">
                <div class="flex-1 min-w-0 flex flex-col items-center text-center arrow-right">
                    <div class="w-full bg-[#18181b] border border-zinc-800 rounded-lg py-2 px-1">
                        <p class="text-[8px] text-zinc-500 uppercase tracking-widest mb-1">1</p>
                        <p class="text-[10px] font-semibold text-white leading-tight">ModeAView</p>
                        <p class="text-[9px] text-zinc-500 mt-1 leading-tight">getModeData()</p>
                    </div>
                </div>
                <div class="flex-1 min-w-0 flex flex-col items-center text-center arrow-right">
                    <div class="w-full bg-[#18181b] border border-zinc-800 rounded-lg py-2 px-1">
                        <p class="text-[8px] text-zinc-500 uppercase tracking-widest mb-1">2</p>
                        <p class="text-[10px] font-semibold text-white leading-tight">TakeoffView</p>
                        <p class="text-[9px] text-zinc-500 mt-1 leading-tight">ROTATE</p>
                    </div>
                </div>
                <div class="flex-1 min-w-0 flex flex-col items-center text-center arrow-right">
                    <div id="node-reset" class="w-full bg-[#18181b] border border-zinc-800 rounded-lg py-2 px-1 transition-all duration-300">
                        <p class="text-[8px] text-zinc-500 uppercase tracking-widest mb-1">3</p>
                        <p class="text-[10px] font-semibold text-white leading-tight">reset()</p>
                        <p id="node-reset-sub" class="text-[9px] mt-1 text-zinc-500 leading-tight">방어적 리셋</p>
                    </div>
                </div>
                <div class="flex-1 min-w-0 flex flex-col items-center text-center">
                    <div id="node-gpws" class="w-full bg-[#18181b] border border-zinc-800 rounded-lg py-2 px-1 transition-all duration-300">
                        <p class="text-[8px] text-zinc-500 uppercase tracking-widest mb-1">4</p>
                        <p class="text-[10px] font-semibold text-white leading-tight">GPS 업데이트</p>
                        <p id="node-gpws-sub" class="text-[9px] mt-1 text-zinc-500 leading-tight">판정</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 py-4 border-y border-zinc-900 max-w-2xl mx-auto w-full bg-zinc-950/20 rounded-lg px-6">
                <div class="text-center flex flex-col justify-center items-center py-2">
                    <span class="text-[10px] font-bold tracking-widest text-zinc-500 uppercase">modeAData (RunningCenter)</span>
                    <span id="dashboard-modea" class="text-xl font-bold mt-1 font-mono">SET</span>
                </div>
                <div class="flex items-center justify-center relative py-2">
                    <div class="absolute left-0 h-10 w-[1px] bg-zinc-800/80"></div>
                    <div class="text-center flex flex-col justify-center items-center w-full">
                        <span class="text-[10px] font-bold tracking-widest text-zinc-500 uppercase">GPWS 상태</span>
                        <span id="dashboard-gpws" class="text-xl font-bold mt-1 font-mono flex items-center gap-2">
                            <span id="dashboard-gpws-dot" class="w-2.5 h-2.5 rounded-full bg-zinc-500 inline-block"></span>
                            <span id="dashboard-gpws-text">NORMAL</span>
                        </span>
                    </div>
                </div>
            </div>

            <div id="architecture-desc-wrap" class="w-full max-w-2xl mx-auto text-center bg-zinc-900/20 p-4 rounded-lg border border-zinc-800/30">
                <span class="text-[10px] font-bold tracking-wider text-zinc-500 uppercase block mb-1">코드로 보면</span>
                <p id="architecture-desc" class="text-xs text-zinc-400 font-mono leading-relaxed"></p>
            </div>

        </main>

        <section class="space-y-4 p-5 bg-zinc-950/60 rounded-xl border border-zinc-900">

            <div class="flex items-center justify-between">
                <div class="flex flex-col">
                    <label class="text-sm font-medium text-zinc-300">reset()이 modeAData도 같이 지움</label>
                    <span id="toggleDesc" class="text-[11px] text-zinc-500">이게 실제로 있던 버그다. 꺼보면 수정 후 동작이 된다.</span>
                </div>
                <button id="toggleBug" class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none bg-red-500">
                    <span id="toggleKnob" class="pointer-events-none inline-block h-5 w-5 transform rounded-full bg-zinc-950 shadow ring-0 transition duration-200 ease-in-out translate-x-5"></span>
                </button>
            </div>

            <div class="h-[1px] bg-zinc-900"></div>

            <div class="flex flex-col gap-3">
                <div class="flex flex-col">
                    <label class="text-sm font-medium text-zinc-300">지금 러너의 페이스 구간</label>
                    <span class="text-[11px] text-zinc-500">목표 대비 지금 페이스가 어느 구간인지 골라본다.</span>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <button data-zone="sinkRate" class="zone-btn px-3 py-2.5 rounded-lg border text-xs font-semibold transition-colors border-zinc-800 text-zinc-400">SINK RATE 구간</button>
                    <button data-zone="normal" class="zone-btn px-3 py-2.5 rounded-lg border text-xs font-semibold transition-colors border-zinc-800 text-zinc-400">정상 구간</button>
                    <button data-zone="overspeed" class="zone-btn px-3 py-2.5 rounded-lg border text-xs font-semibold transition-colors border-zinc-800 text-zinc-400">OVERSPEED 구간</button>
                </div>
            </div>

        </section>

    </div>

    <script>
        const state = {
            bugPresent: true,
            paceZone: 'sinkRate'
        };

        const toggleBug = document.getElementById('toggleBug');
        const toggleKnob = document.getElementById('toggleKnob');
        const toggleDesc = document.getElementById('toggleDesc');
        const zoneButtons = document.querySelectorAll('.zone-btn');

        const nodeReset = document.getElementById('node-reset');
        const nodeResetSub = document.getElementById('node-reset-sub');
        const nodeGpws = document.getElementById('node-gpws');
        const nodeGpwsSub = document.getElementById('node-gpws-sub');

        const dashboardModea = document.getElementById('dashboard-modea');
        const dashboardGpws = document.getElementById('dashboard-gpws-text');
        const dashboardGpwsDot = document.getElementById('dashboard-gpws-dot');
        const architectureDesc = document.getElementById('architecture-desc');

        const zoneLabels = {
            sinkRate: 'SINK RATE',
            normal: 'NORMAL',
            overspeed: 'OVERSPEED'
        };

        toggleBug.addEventListener('click', () => {
            state.bugPresent = !state.bugPresent;
            updateUI();
        });

        zoneButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                state.paceZone = btn.dataset.zone;
                updateUI();
            });
        });

        function computeGpwsStatus() {
            if (state.bugPresent) return 'normal';
            return state.paceZone;
        }

        function updateUI() {
            if (state.bugPresent) {
                toggleBug.className = "relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none bg-red-500";
                toggleKnob.className = "pointer-events-none inline-block h-5 w-5 transform rounded-full bg-zinc-950 shadow ring-0 transition duration-200 ease-in-out translate-x-5";
                toggleDesc.innerText = "이게 실제로 있던 버그다. 꺼보면 수정 후 동작이 된다.";
            } else {
                toggleBug.className = "relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none bg-emerald-500";
                toggleKnob.className = "pointer-events-none inline-block h-5 w-5 transform rounded-full bg-zinc-950 shadow ring-0 transition duration-200 ease-in-out translate-x-0";
                toggleDesc.innerText = "수정 후 상태. clearModeAData()가 따로 있어서 reset()은 modeAData를 안 건드린다.";
            }

            zoneButtons.forEach(btn => {
                const active = btn.dataset.zone === state.paceZone;
                btn.className = "zone-btn px-3 py-2.5 rounded-lg border text-xs font-semibold transition-colors " +
                    (active ? "border-blue-400 bg-blue-400/10 text-blue-300" : "border-zinc-800 text-zinc-400");
            });

            if (state.bugPresent) {
                nodeReset.className = "w-full bg-[#1f1618] border border-red-900/80 rounded-lg py-3 px-2 transition-all duration-300";
                nodeResetSub.className = "text-[10px] mt-1 text-red-400";
                nodeResetSub.innerText = "modeAData = nil";
                dashboardModea.className = "text-xl font-bold mt-1 font-mono text-red-400";
                dashboardModea.innerText = "NIL";
            } else {
                nodeReset.className = "w-full bg-[#18181b] border border-zinc-800 rounded-lg py-3 px-2 transition-all duration-300";
                nodeResetSub.className = "text-[10px] mt-1 text-zinc-500";
                nodeResetSub.innerText = "modeAData는 그대로";
                dashboardModea.className = "text-xl font-bold mt-1 font-mono text-emerald-400";
                dashboardModea.innerText = "SET";
            }

            const gpwsStatus = computeGpwsStatus();
            dashboardGpws.innerText = zoneLabels[gpwsStatus];

            if (gpwsStatus === 'normal') {
                nodeGpws.className = "w-full bg-[#18181b] border border-zinc-800 rounded-lg py-3 px-2 transition-all duration-300";
                nodeGpwsSub.className = "text-[10px] mt-1 text-zinc-500";
                dashboardGpwsDot.className = "w-2.5 h-2.5 rounded-full bg-zinc-500 inline-block";
                dashboardGpws.className = "text-zinc-300";
            } else if (gpwsStatus === 'sinkRate') {
                nodeGpws.className = "w-full bg-[#1f1618] border border-red-900/80 rounded-lg py-3 px-2 transition-all duration-300";
                nodeGpwsSub.className = "text-[10px] mt-1 text-red-400";
                dashboardGpwsDot.className = "w-2.5 h-2.5 rounded-full bg-red-500 inline-block animate-pulse";
                dashboardGpws.className = "text-red-400";
            } else {
                nodeGpws.className = "w-full bg-[#1f1b15] border border-amber-900/80 rounded-lg py-3 px-2 transition-all duration-300";
                nodeGpwsSub.className = "text-[10px] mt-1 text-amber-400";
                dashboardGpwsDot.className = "w-2.5 h-2.5 rounded-full bg-amber-500 inline-block animate-pulse";
                dashboardGpws.className = "text-amber-400";
            }
            nodeGpwsSub.innerText = state.bugPresent ? "modeAData 없음" : "판정: " + zoneLabels[gpwsStatus];

            if (state.bugPresent) {
                architectureDesc.innerText = "guard let modeA = modeAData else { return .normal }  // 페이스 구간과 무관하게 항상 여기서 끝난다";
            } else {
                architectureDesc.innerText = "modeAData가 살아있어서 calculateGPWSStatus(pace)까지 도달, 실제 페이스 구간(" + zoneLabels[gpwsStatus] + ")대로 판정된다";
            }
        }

        updateUI();
    </script>
</body>
</html>
