<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Observable Render Counter</title>
<style>
    body {
        margin: 0; padding: 15px; background: #020617; color: #f8fafc;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        box-sizing: border-box;
    }
    #wrapper {
        width: 100%; max-width: 820px; margin: 0 auto; padding: 25px;
        background: #050816; border-radius: 24px; border: 1px solid rgba(255,255,255,0.06);
        box-sizing: border-box;
    }
    .header h2 { margin: 0 0 6px 0; font-size: 20px; color: #38bdf8; }
    .header p { margin: 0 0 25px 0; font-size: 13px; color: #94a3b4; line-height: 1.5; }

    /* Controls */
    .control-panel {
        display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px;
        background: rgba(255,255,255,0.02); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05);
    }
    .toggle-group { display: flex; gap: 10px; }
    .btn-toggle {
        flex: 1; padding: 12px; font-size: 14px; font-weight: bold; border-radius: 10px;
        background: #0f172a; color: #64748b; border: 1px solid #334155; cursor: pointer; transition: 0.2s;
    }
    .btn-toggle.active { background: #3b82f6; color: white; border-color: #60a5fa; box-shadow: 0 0 15px rgba(59,130,246,0.3); }
    
    .action-group { display: flex; gap: 10px; }
    .btn-action {
        flex: 1; padding: 12px; font-size: 14px; font-weight: bold; border-radius: 10px;
        background: #1e293b; color: white; border: 1px solid #475569; cursor: pointer;
    }
    .btn-action:hover { background: #334155; }
    .btn-action:active { transform: scale(0.98); }

    /* View Containers */
    .view-container {
        position: relative; border: 2px dashed #475569; border-radius: 16px; padding: 30px 20px 20px 20px;
        transition: background-color 0.4s ease-out; background-color: rgba(15, 23, 42, 0.5);
    }
    .view-title { position: absolute; top: -12px; left: 20px; background: #050816; padding: 0 10px; font-weight: bold; color: #cbd5e1; font-size: 14px; }
    
    .render-badge {
        position: absolute; top: -15px; right: 20px; background: #ef4444; color: white;
        padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold;
        box-shadow: 0 4px 6px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 5px;
    }
    .render-badge span { font-size: 16px; }

    .child-views {
        display: flex; gap: 20px; margin-top: 20px;
    }
    .child-view {
        flex: 1; position: relative; border: 2px solid #334155; border-radius: 12px; padding: 25px 15px 15px 15px;
        background-color: #0f172a; transition: background-color 0.4s ease-out;
        display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100px;
    }
    .data-display { font-size: 24px; font-weight: bold; color: #38bdf8; margin-top: 10px;}

    /* Flash Animations */
    @keyframes flash-bad { 0% { background-color: rgba(234, 179, 8, 0.4); border-color: #facc15; } 100% { background-color: rgba(15, 23, 42, 0.5); border-color: #475569; } }
    @keyframes flash-bad-child { 0% { background-color: rgba(234, 179, 8, 0.4); border-color: #facc15; } 100% { background-color: #0f172a; border-color: #334155; } }
    
    @keyframes flash-good { 0% { background-color: rgba(16, 185, 129, 0.4); border-color: #34d399; } 100% { background-color: #0f172a; border-color: #334155; } }
    
    .animate-flash-bad { animation: flash-bad 0.6s ease-out; }
    .animate-flash-bad-child { animation: flash-bad-child 0.6s ease-out; }
    .animate-flash-good { animation: flash-good 0.6s ease-out; }

    /* Log Panel */
    .log-panel {
        margin-top: 25px; padding: 15px; background: #02040d; border-radius: 12px;
        border: 1px solid #1e293b; font-size: 13px; color: #94a3b8; min-height: 40px;
    }
    .highlight { color: #facc15; font-weight: bold; }
    .highlight-good { color: #34d399; font-weight: bold; }
</style>
</head>
<body>

<div id="wrapper">
    <div class="header">
        <h2>🔄 SwiftUI 렌더링 추적 시뮬레이터</h2>
        <p>기존 ObservableObject의 <b>과잉 렌더링(전체 새로고침)</b>과 iOS 17 @Observable의 <b>정밀 추적(변경된 뷰만 새로고침)</b>을 카운터로 비교해 보세요.</p>
    </div>

    <div class="control-panel">
        <div class="toggle-group">
            <button id="mode-legacy" class="btn-toggle active" onclick="setMode('legacy')">기존 방식 (ObservableObject)</button>
            <button id="mode-modern" class="btn-toggle" onclick="setMode('modern')">iOS 17 (@Observable)</button>
        </div>
        <div class="action-group">
            <button class="btn-action" onclick="triggerUpdate('location')">📍 위치 데이터 변경</button>
            <button class="btn-action" onclick="triggerUpdate('profile')">👥 프로필 수 증가</button>
        </div>
    </div>

    <div class="view-container" id="main-view">
        <div class="view-title">Main View (부모 뷰)</div>
        <div class="render-badge">렌더링 <span id="count-main">0</span></div>
        
        <div style="font-size: 12px; color: #64748b; text-align: center;">@StateObject / @State viewModel 소유</div>

        <div class="child-views">
            <div class="child-view" id="loc-view">
                <div class="view-title" style="top: -10px; font-size: 12px;">Location View</div>
                <div class="render-badge" style="background:#f59e0b; top: -12px;">렌더링 <span id="count-loc">0</span></div>
                <div style="font-size: 12px; color: #94a3b8;">현재 위치</div>
                <div class="data-display" id="data-loc">서울</div>
            </div>

            <div class="child-view" id="prof-view">
                <div class="view-title" style="top: -10px; font-size: 12px;">Profile View</div>
                <div class="render-badge" style="background:#f59e0b; top: -12px;">렌더링 <span id="count-prof">0</span></div>
                <div style="font-size: 12px; color: #94a3b8;">체크인 인원</div>
                <div class="data-display" id="data-prof">5 명</div>
            </div>
        </div>
    </div>

    <div class="log-panel" id="log-text">
        시뮬레이터를 조작하여 렌더링 동작을 확인하세요.
    </div>
</div>

<script>
    let mode = 'legacy'; // 'legacy' or 'modern'
    let counts = { main: 0, loc: 0, prof: 0 };
    let data = { locIdx: 0, profCount: 5 };
    const locations = ["서울", "부산", "제주", "뉴욕", "파리"];

    function setMode(newMode) {
        mode = newMode;
        document.getElementById('mode-legacy').classList.toggle('active', mode === 'legacy');
        document.getElementById('mode-modern').classList.toggle('active', mode === 'modern');
        
        // Reset counts on mode change for clarity
        counts = { main: 0, loc: 0, prof: 0 };
        updateCounters();
        
        document.getElementById('log-text').innerHTML = mode === 'legacy' ? 
            "현재 <b>ObservableObject 모드</b>입니다. 데이터가 하나라도 바뀌면 <span class='highlight'>구독 중인 모든 뷰가 렌더링</span>됩니다." : 
            "현재 <b>@Observable 모드</b>입니다. <span class='highlight-good'>정확히 해당 데이터를 읽고 있는 뷰만</span> 선별적으로 렌더링됩니다.";
    }

    function triggerAnimation(elementId, animClass) {
        const el = document.getElementById(elementId);
        el.classList.remove(animClass);
        void el.offsetWidth; // Trigger reflow
        el.classList.add(animClass);
    }

    function updateCounters() {
        document.getElementById('count-main').innerText = counts.main;
        document.getElementById('count-loc').innerText = counts.loc;
        document.getElementById('count-prof').innerText = counts.prof;
    }

    function triggerUpdate(type) {
        // Update Data
        if (type === 'location') {
            data.locIdx = (data.locIdx + 1) % locations.length;
            document.getElementById('data-loc').innerText = locations[data.locIdx];
        } else {
            data.profCount += 1;
            document.getElementById('data-prof').innerText = data.profCount + " 명";
        }

        // Apply Rendering Logic based on Architecture Mode
        if (mode === 'legacy') {
            // ObservableObject: Everything updates
            counts.main++; counts.loc++; counts.prof++;
            
            triggerAnimation('main-view', 'animate-flash-bad');
            triggerAnimation('loc-view', 'animate-flash-bad-child');
            triggerAnimation('prof-view', 'animate-flash-bad-child');
            
            document.getElementById('log-text').innerHTML = `🚨 <span class='highlight'>[과잉 렌더링 발생]</span> ${type === 'location' ? '위치' : '프로필'} 데이터만 바뀌었지만, @Published에 의해 Main, Location, Profile 뷰가 모두 리렌더링 되었습니다.`;
        } else {
            // @Observable: Fine-grained tracking
            if (type === 'location') {
                counts.loc++;
                triggerAnimation('loc-view', 'animate-flash-good');
                document.getElementById('log-text').innerHTML = `✅ <span class='highlight-good'>[정밀 렌더링]</span> 위치 데이터가 변경되어 Location View의 카운터만 증가했습니다. Main과 Profile은 다시 그리지 않습니다.`;
            } else {
                counts.prof++;
                triggerAnimation('prof-view', 'animate-flash-good');
                document.getElementById('log-text').innerHTML = `✅ <span class='highlight-good'>[정밀 렌더링]</span> 프로필 수가 변경되어 Profile View의 카운터만 증가했습니다. Main과 Location은 다시 그리지 않습니다.`;
            }
        }
        
        updateCounters();
    }
</script>
</body>
</html>
