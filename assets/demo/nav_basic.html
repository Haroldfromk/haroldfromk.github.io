<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body { margin: 0; padding: 10px; background: #020617; color: white; font-family: sans-serif; box-sizing: border-box; }
    #wrapper { width: 100%; max-width: 800px; margin: 0 auto; padding: 20px; border-radius: 20px; background: #050816; border: 1px solid rgba(255,255,255,0.05); box-sizing: border-box; }
    .header h2 { margin: 0 0 5px 0; font-size: 16px; }
    .header p { margin: 0; font-size: 11px; color: #9ba3b4; margin-bottom: 15px; }
    .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    
    .phone { width: 100%; height: 280px; border-radius: 20px; border: 5px solid #1e293b; background: #0f172a; position: relative; overflow: hidden; box-sizing: border-box; }
    .view-layer { position: absolute; inset: 0; background: #0f172a; transition: transform 0.3s ease; display: flex; flex-direction: column; }
    .nav-bar { height: 40px; background: rgba(30, 41, 59, 0.9); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.1); position: relative;}
    .back-btn { position: absolute; left: 10px; color: #38bdf8; font-size: 11px; cursor: pointer; }
    .list-item { background: rgba(255,255,255,0.04); padding: 12px; border-radius: 8px; margin: 8px 12px; color: #38bdf8; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.1s; }
    .list-item:hover { background: rgba(255,255,255,0.08); }
    
    .data-panel { background: rgba(255,255,255,0.02); border-radius: 12px; padding: 15px; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.05); }
    .code-block { background: #02040d; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 11px; color: #e2e8f0; border: 1px solid rgba(255,255,255,0.04); margin-top: 10px; flex: 1; }
    .type { color: #e5c07b; } .string { color: #98c379; } .keyword { color: #c678dd; }
</style>
</head>
<body>
<div id="wrapper">
    <div class="header">
        <h2>📱 1단계: 기본 Data-Driven 동작 (GrubSpots 적용)</h2>
        <p>리스트를 클릭하면 배열에 단 1개의 데이터만 추가되며 화면이 전환됩니다.</p>
    </div>
    <div class="layout">
        <div class="phone" id="phone">
            <div class="view-layer" id="root-view" style="z-index: 1;">
                <div class="nav-bar">Grub Spots</div>
                <div class="list-item" onclick="pushView('해운대 암소갈비')">📍 해운대 암소갈비 ›</div>
                <div class="list-item" onclick="pushView('광안리 톤쇼우')">📍 광안리 톤쇼우 ›</div>
            </div>
            <div class="view-layer" id="detail-view" style="z-index: 2; transform: translateX(100%);">
                <div class="nav-bar"><span class="back-btn" onclick="popView()">❮ Back</span>상세 정보</div>
                <div style="padding: 20px; text-align: center;">
                    <div style="font-size: 30px; margin-bottom: 10px;">🍔</div>
                    <div id="detail-title" style="font-size: 14px; font-weight: bold;"></div>
                    <div style="font-size: 11px; color:#64748b; margin-top:10px;">배열에 데이터가 존재하여<br>상세 뷰가 유지됩니다.</div>
                </div>
            </div>
        </div>
        <div class="data-panel">
            <div style="font-size: 13px; font-weight: bold;">path 배열 상태</div>
            <div class="code-block">
                <span class="keyword">@State var</span> path: [<span class="type">DDGLocation</span>] = [<br>
                <div id="array-content" style="padding-left: 15px; color: #64748b;">// 비어있음 (Root)</div>
                ]
            </div>
        </div>
    </div>
</div>
<script>
    const detailView = document.getElementById('detail-view');
    const arrayContent = document.getElementById('array-content');
    const detailTitle = document.getElementById('detail-title');

    function pushView(name) {
        detailTitle.innerText = name;
        detailView.style.transform = 'translateX(0)';
        arrayContent.innerHTML = `<span class="type">DDGLocation</span>(name: <span class="string">"${name}"</span>)`;
    }
    function popView() {
        detailView.style.transform = 'translateX(100%)';
        arrayContent.innerHTML = '// 비어있음 (Root)';
    }
</script>
</body>
</html>
