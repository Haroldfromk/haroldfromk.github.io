<!-- [코드 1] State vs Bindable Swift Simulator -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftUI @State vs @Bindable Simulator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .view-box {
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .parent-view {
            background-color: #e0f2fe;
            border: 2px solid #bae6fd;
        }

        .children-row {
            display: flex;
            gap: 20px;
        }

        .child-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 20px;
            border-radius: 10px;
        }

        .correct-view {
            background-color: #dcfce7;
            border: 2px solid #bbf7d0;
        }

        .buggy-view {
            background-color: #fee2e2;
            border: 2px solid #fecaca;
        }

        h3, h4 {
            margin: 0 0 10px 0;
        }

        .user-name {
            font-size: 1.25rem;
            font-weight: bold;
            margin: 10px 0;
        }

        .toggle-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        input[type="text"] {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 1rem;
            width: 80%;
            box-sizing: border-box;
        }

        button.btn {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        button.btn:hover {
            background-color: #2563eb;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Parent View -->
    <div class="view-box parent-view">
        <h3>👨‍💻 부모 뷰 (데이터의 주인)</h3>
        <div class="user-name">현재 접속자: <span id="parentName"></span></div>
        <button class="btn" onclick="replaceInstance()">
            새로운 유저 데이터 불러오기<br>
            <span style="font-size: 0.8rem; font-weight: normal;">(인스턴스 교체)</span>
        </button>
    </div>

    <div class="children-row">
        <!-- Correct Child (@Bindable) -->
        <div class="view-box child-view correct-view">
            <h4 style="color: #166534;">✅ 정상 뷰<br>(@Bindable)</h4>
            <div class="user-name" id="correctName"></div>
            
            <div class="toggle-group">
                <label>편집</label>
                <input type="checkbox" id="correctToggle" onchange="onCorrectToggle(this.checked)">
            </div>
            
            <input type="text" id="correctInput" oninput="onCorrectInput(this.value)" placeholder="이름">
        </div>

        <!-- Buggy Child (@State) -->
        <div class="view-box child-view buggy-view">
            <h4 style="color: #991b1b;">❌ 버그 뷰<br>(@State)</h4>
            <div class="user-name" id="buggyName"></div>
            
            <div class="toggle-group">
                <label>편집</label>
                <input type="checkbox" id="buggyToggle" onchange="onBuggyToggle(this.checked)">
            </div>
            
            <input type="text" id="buggyInput" oninput="onBuggyInput(this.value)" placeholder="이름">
        </div>
    </div>
</div>

<script>
    // 1. 공통 뷰모델 클래스
    class UserViewModel {
        constructor(userName) {
            this.userName = userName;
            this.isEditing = false;
        }
    }

    // 2. 부모 뷰의 상태 (@State private var viewModel = UserViewModel(...))
    let parentViewModel = new UserViewModel("Harold");
    
    // 3. 버그 뷰의 상태 (초기화 시점에 들어온 객체를 억지로 로컬 변수에 복사해버림)
    let buggyViewModel = parentViewModel;

    // 인스턴스를 통째로 교체하는 함수 (버튼 클릭 시)
    function replaceInstance() {
        const names = ["David", "Alice", "Bob", "Charlie", "Eve"];
        const randomName = names[Math.floor(Math.random() * names.length)];
        
        // 🚨 기존 객체를 버리고 새로운 객체를 '생성'
        parentViewModel = new UserViewModel(randomName);
        
        // 참고: buggyViewModel은 여전히 옛날 첫 번째 객체를 가리키고 있음!
        render();
    }

    // 정상 뷰(@Bindable) 액션: 항상 parentViewModel을 수정함
    function onCorrectToggle(isChecked) {
        parentViewModel.isEditing = isChecked;
        render();
    }
    function onCorrectInput(value) {
        parentViewModel.userName = value;
        render();
    }

    // 버그 뷰(@State) 액션: 자기가 갇혀버린 옛날 buggyViewModel을 수정함
    function onBuggyToggle(isChecked) {
        buggyViewModel.isEditing = isChecked;
        render();
    }
    function onBuggyInput(value) {
        buggyViewModel.userName = value;
        render();
    }

    // 화면 그리기 함수
    function render() {
        // 부모 화면 업데이트
        document.getElementById('parentName').innerText = parentViewModel.userName;

        // 정상 뷰 화면 업데이트 (항상 parentViewModel 참조)
        document.getElementById('correctName').innerText = parentViewModel.userName;
        document.getElementById('correctToggle').checked = parentViewModel.isEditing;
        
        const correctInput = document.getElementById('correctInput');
        correctInput.style.display = parentViewModel.isEditing ? 'block' : 'none';
        if(parentViewModel.isEditing && correctInput.value !== parentViewModel.userName) {
             correctInput.value = parentViewModel.userName;
        }

        // 버그 뷰 화면 업데이트 (항상 buggyViewModel 참조)
        document.getElementById('buggyName').innerText = buggyViewModel.userName;
        document.getElementById('buggyToggle').checked = buggyViewModel.isEditing;
        
        const buggyInput = document.getElementById('buggyInput');
        buggyInput.style.display = buggyViewModel.isEditing ? 'block' : 'none';
        if(buggyViewModel.isEditing && buggyInput.value !== buggyViewModel.userName) {
             buggyInput.value = buggyViewModel.userName;
        }
    }

    // 앱 시작
    render();
</script>

</body>
</html>
