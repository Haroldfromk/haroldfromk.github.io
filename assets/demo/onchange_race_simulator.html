<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>onChange Race Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    },
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b;
            color: #f4f4f5;
            user-select: none;
            -webkit-user-select: none;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 3px; }
        #packet {
            transition: left 1.1s cubic-bezier(0.65, 0, 0.35, 1), opacity 0.4s ease, background-color 0.3s ease, box-shadow 0.3s ease;
        }
        .track-line {
            background: repeating-linear-gradient(90deg, #3f3f46 0, #3f3f46 6px, transparent 6px, transparent 12px);
        }
        .node-dot {
            transition: background-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between p-4 md:p-8 overflow-x-hidden">

    <div class="max-w-4xl w-full mx-auto flex-1 flex flex-col justify-between gap-6">

        <header class="flex justify-between items-center border-b border-zinc-800/80 pb-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-normal tracking-tight text-white">onChange Race</h1>
                <p class="text-xs text-zinc-500 mt-1">워치에서 출발한 러닝 기록이 HomeView가 뜨기도 전에 도착하면 벌어지는 일</p>
            </div>
        </header>

        <main class="relative w-full flex-1 flex flex-col justify-center gap-8 my-2 rounded-xl bg-zinc-950/40 border border-zinc-900 p-6 pt-10 pb-10">

            <div class="relative w-full h-14">
                <div class="track-line absolute left-0 right-0 top-1/2 -translate-y-1/2 h-[2px]"></div>

                <div id="packet" class="absolute top-1/2 z-10 w-4 h-4 -mt-2 -ml-2 rounded-full bg-blue-400" style="left: 0%; box-shadow: 0 0 12px rgba(96,165,250,0.7);"></div>

                <div id="node-0" class="node-dot absolute top-1/2 -translate-y-1/2 -ml-[5px] w-[10px] h-[10px] rounded-full bg-zinc-700" style="left: 0%;"></div>
                <div id="node-1" class="node-dot absolute top-1/2 -translate-y-1/2 -ml-[5px] w-[10px] h-[10px] rounded-full bg-zinc-700" style="left: 20%;"></div>
                <div id="node-2" class="node-dot absolute top-1/2 -translate-y-1/2 -ml-[5px] w-[10px] h-[10px] rounded-full bg-zinc-700" style="left: 40%;"></div>
                <div id="node-3" class="node-dot absolute top-1/2 -translate-y-1/2 -ml-[5px] w-[10px] h-[10px] rounded-full bg-zinc-700" style="left: 60%;"></div>
                <div id="node-4" class="node-dot absolute top-1/2 -translate-y-1/2 -ml-[5px] w-[10px] h-[10px] rounded-full bg-zinc-700" style="left: 80%;"></div>
                <div id="node-5" class="node-dot absolute top-1/2 -translate-y-1/2 -ml-[5px] w-[10px] h-[10px] rounded-full bg-zinc-700" style="left: 100%;"></div>
            </div>

            <div class="relative w-full text-[9px] md:text-[10px] text-zinc-500 leading-tight">
                <div class="absolute text-center" style="left: 0%; transform: translateX(-2px);"><p class="w-16 -ml-8">워치<br>러닝 종료</p></div>
                <div class="absolute text-center" style="left: 20%;"><p class="w-16 -ml-8">OS 전송<br>대기열</p></div>
                <div class="absolute text-center" style="left: 40%;"><p class="w-20 -ml-10">아이폰<br>콜드 런치</p></div>
                <div class="absolute text-center" style="left: 60%;"><p class="w-24 -ml-12">pendingWatch<br>DataQueue</p></div>
                <div class="absolute text-center" style="left: 80%;"><p class="w-20 -ml-10">HomeView<br>마운트</p></div>
                <div class="absolute text-right" style="left: 100%;"><p class="w-16 -ml-8">로그북</p></div>
            </div>

            <div id="status-box" class="w-full max-w-2xl mx-auto text-center bg-zinc-900/20 p-4 rounded-lg border border-zinc-800/30 mt-2">
                <span id="status-title" class="text-[10px] font-bold tracking-wider text-zinc-500 uppercase block mb-1">대기 중</span>
                <p id="status-desc" class="text-xs text-zinc-400 font-mono leading-relaxed">재생을 누르면 러닝 기록이 워치에서 출발한다</p>
            </div>

        </main>

        <section class="space-y-4 p-5 bg-zinc-950/60 rounded-xl border border-zinc-900">

            <div class="flex items-center justify-between">
                <div class="flex flex-col">
                    <label class="text-sm font-medium text-zinc-300">onAppear에서도 큐를 확인 (수정 후)</label>
                    <span id="toggleDesc" class="text-[11px] text-zinc-500">꺼보면 .onChange 하나만 있던 수정 전 상태가 된다.</span>
                </div>
                <button id="toggleFix" class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none bg-emerald-500">
                    <span id="toggleKnob" class="pointer-events-none inline-block h-5 w-5 transform rounded-full bg-zinc-950 shadow ring-0 transition duration-200 ease-in-out translate-x-5"></span>
                </button>
            </div>

            <div class="h-[1px] bg-zinc-900"></div>

            <button id="playBtn" class="w-full px-3 py-2.5 rounded-lg border border-blue-400/40 bg-blue-400/10 text-blue-300 text-xs font-semibold transition-colors hover:bg-blue-400/20">
                재생: 러닝 기록 전달 시뮬레이션
            </button>

        </section>

    </div>

    <script>
        const state = { hasOnAppearFix: true, playing: false };

        const toggleFix = document.getElementById('toggleFix');
        const toggleKnob = document.getElementById('toggleKnob');
        const toggleDesc = document.getElementById('toggleDesc');
        const playBtn = document.getElementById('playBtn');
        const packet = document.getElementById('packet');
        const statusTitle = document.getElementById('status-title');
        const statusDesc = document.getElementById('status-desc');
        const statusBox = document.getElementById('status-box');

        const nodes = [0, 1, 2, 3, 4, 5].map(i => document.getElementById('node-' + i));
        const positions = [0, 20, 40, 60, 80, 100];

        const steps = [
            { title: '워치: 러닝 종료', desc: 'saveRunningData() → transferUserInfo() 호출' },
            { title: 'OS 전송 대기열', desc: '아이폰이 unreachable이어도 시스템 큐에 쌓인다' },
            { title: '아이폰 콜드 런치', desc: 'WCSession 활성화, didReceiveUserInfo 실행' },
            { title: 'pendingWatchDataQueue', desc: 'HomeView가 뜨기 전인데 큐엔 이미 append됨' },
            { title: 'HomeView 마운트', desc: '' },
            { title: '로그북', desc: '' },
        ];

        toggleFix.addEventListener('click', () => {
            state.hasOnAppearFix = !state.hasOnAppearFix;
            resetUI();
        });

        playBtn.addEventListener('click', () => {
            if (state.playing) return;
            playSequence();
        });

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function resetNodes() {
            nodes.forEach(n => {
                n.className = "node-dot absolute top-1/2 -translate-y-1/2 -ml-[5px] w-[10px] h-[10px] rounded-full bg-zinc-700";
                n.style.transform = "translateY(-50%)";
            });
        }

        function resetUI() {
            state.playing = false;

            if (state.hasOnAppearFix) {
                toggleFix.className = "relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none bg-emerald-500";
                toggleKnob.className = "pointer-events-none inline-block h-5 w-5 transform rounded-full bg-zinc-950 shadow ring-0 transition duration-200 ease-in-out translate-x-5";
                toggleDesc.innerText = "수정 후 상태. HomeView가 늦게 떠도 onAppear가 큐를 한 번 더 확인한다.";
            } else {
                toggleFix.className = "relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none bg-red-500";
                toggleKnob.className = "pointer-events-none inline-block h-5 w-5 transform rounded-full bg-zinc-950 shadow ring-0 transition duration-200 ease-in-out translate-x-0";
                toggleDesc.innerText = "이게 실제로 있던 버그다. .onChange 하나만 믿고 있었다.";
            }

            packet.style.transition = "none";
            packet.style.left = "0%";
            packet.style.opacity = "1";
            packet.style.backgroundColor = "#60a5fa";
            packet.style.boxShadow = "0 0 12px rgba(96,165,250,0.7)";
            void packet.offsetWidth;
            packet.style.transition = "left 1.1s cubic-bezier(0.65, 0, 0.35, 1), opacity 0.4s ease, background-color 0.3s ease, box-shadow 0.3s ease";

            resetNodes();
            statusBox.className = "w-full max-w-2xl mx-auto text-center bg-zinc-900/20 p-4 rounded-lg border border-zinc-800/30 mt-2";
            statusTitle.innerText = "대기 중";
            statusDesc.innerText = "재생을 누르면 러닝 기록이 워치에서 출발한다";

            playBtn.disabled = false;
            playBtn.className = "w-full px-3 py-2.5 rounded-lg border border-blue-400/40 bg-blue-400/10 text-blue-300 text-xs font-semibold transition-colors hover:bg-blue-400/20";
            playBtn.innerText = "재생: 러닝 기록 전달 시뮬레이션";
        }

        function lightNode(i, colorClass) {
            nodes[i].className = "node-dot absolute top-1/2 -ml-[5px] w-[10px] h-[10px] rounded-full " + colorClass;
            nodes[i].style.transform = "translateY(-50%) scale(1.4)";
        }

        async function playSequence() {
            state.playing = true;
            playBtn.disabled = true;
            playBtn.className = "w-full px-3 py-2.5 rounded-lg border border-zinc-800 text-zinc-500 text-xs font-semibold cursor-default";
            playBtn.innerText = "재생 중...";

            // 0 -> 3: 워치 출발부터 아이폰 큐 도착까지는 fix 여부와 무관하게 동일
            for (let i = 0; i <= 3; i++) {
                lightNode(i, "bg-blue-400 shadow-[0_0_8px_rgba(96,165,250,0.8)]");
                statusTitle.innerText = steps[i].title;
                statusDesc.innerText = steps[i].desc;
                packet.style.left = positions[i] + "%";
                await sleep(2200);
            }

            if (state.hasOnAppearFix) {
                // 계속 진행: HomeView 마운트 -> 로그북
                lightNode(4, "bg-blue-400 shadow-[0_0_8px_rgba(96,165,250,0.8)]");
                statusTitle.innerText = "HomeView 마운트";
                statusDesc.innerText = "onAppear가 마운트 시점의 큐를 그대로 한 번 더 확인한다";
                packet.style.left = positions[4] + "%";
                await sleep(2200);

                lightNode(5, "bg-emerald-400 shadow-[0_0_10px_rgba(52,211,153,0.9)]");
                packet.style.left = positions[5] + "%";
                packet.style.backgroundColor = "#34d399";
                packet.style.boxShadow = "0 0 14px rgba(52,211,153,0.9)";
                statusTitle.innerText = "로그북 저장 완료";
                statusDesc.innerText = "drainPendingWatchData()가 SwiftData에 insert()해서 저장한다";
                statusBox.className = "w-full max-w-2xl mx-auto text-center bg-emerald-950/20 p-4 rounded-lg border border-emerald-900/40 mt-2";
                await sleep(1200);
            } else {
                // pendingWatchDataQueue 노드에서 정지, 더 진행하지 않음
                lightNode(3, "bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.9)]");
                packet.style.opacity = "0.25";
                packet.style.backgroundColor = "#ef4444";
                packet.style.boxShadow = "0 0 10px rgba(239,68,68,0.6)";
                statusTitle.innerText = "여기서 멈춤";
                statusDesc.innerText = ".onChange만 있어서 아무도 이 기록을 로그북에 저장하지 않는다. 큐 안에 남아있을 뿐, 앱이 꺼지면 그대로 사라진다";
                statusBox.className = "w-full max-w-2xl mx-auto text-center bg-red-950/20 p-4 rounded-lg border border-red-900/40 mt-2";
                await sleep(1200);
            }

            playBtn.disabled = false;
            playBtn.className = "w-full px-3 py-2.5 rounded-lg border border-blue-400/40 bg-blue-400/10 text-blue-300 text-xs font-semibold transition-colors hover:bg-blue-400/20";
            playBtn.innerText = "다시 재생";
            state.playing = false;
        }

        resetUI();
    </script>
</body>
</html>
